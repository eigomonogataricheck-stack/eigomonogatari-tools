<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>英語物語 Tier表生成 & キャラ図鑑</title>
  <meta name="description" content="英語物語の対戦キャラTier表を自動生成。キャラ図鑑で全キャラを検索・閲覧できます。">
  <meta name="keywords" content="英語物語,Tier表,キャラ図鑑,ゆる,対戦">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h4 class="text-center mb-4">Tier表生成</h4>
  <div class="mb-3">
    <label>モード</label>
    <select id="mode" class="form-select">
      <option>ランクアップ</option><option>使用者数</option>
    </select>
  </div>
  <div class="row mb-3">
    <div class="col-6"><label>属性（縛り）</label><select id="attribute" class="form-select"><option value="">指定なし</option></select></div>
    <div class="col-6"><label>コスト帯</label>
      <select id="cost" class="form-select"><option value="">指定なし</option><option value="低">低 (~150)</option><option value="中">中 (151~220)</option><option value="高">高 (221~350)</option><option value="超高">超高 (351~)</option></select>
    </div>
  </div>
  <div class="row mb-3">
    <div class="col-4"><label>枠 (1-5)</label>
      <select id="waku" class="form-select"><option value="">指定なし</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
    </div>
    <div class="col-4"><label>補正</label>
      <select id="hosei" class="form-select"><option value="0" selected>含まない</option><option value="">含む</option><option value="1">補正のみ</option></select>
    </div>
    <div class="col-4"><label>最小データ数</label>
      <select id="minCount" class="form-select"><option value="5">5</option><option value="10" selected>10</option><option value="20">20</option></select>
    </div>
  </div>
  <button class="btn btn-primary w-100 py-3 fw-bold shadow-sm" onclick="execTier()" id="btn" disabled>データ読み込み中...</button>
  <div id="tier-result" class="mt-4"></div>

  <hr class="my-5">
  <h4 class="text-center mb-3">📖 キャラ図鑑</h4>
  <button class="btn btn-outline-success w-100 py-2 fw-bold" onclick="loadZukan()" id="zkBtn">キャラ図鑑を表示</button>
  <div id="zkLoader" class="text-center mt-3" style="display:none"><div class="spinner-border text-success me-2"></div><span>読み込み中...</span></div>
  <div id="zkControls" style="display:none" class="mt-3">
    <input type="text" id="zkSearch" class="form-control mb-2" placeholder="キャラ名で検索...">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span id="zkCount" class="text-muted small me-auto"></span>
      <button class="btn btn-sm btn-outline-secondary" onclick="toggleAll()">全て開く/閉じる</button>
    </div>
  </div>
  <div id="zkBox"></div>
  <footer class="text-center mt-5 text-muted small">
    <p>英語物語 非公式ツール</p>
  </footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<div id="opinionBox" style="max-width:600px; margin:32px auto; padding:16px; border:1px solid #ccc; border-radius:8px; background:#fff;">
  <p style="margin:0 0 8px; color:#555; font-size:14px;">📮 意見箱（匿名で送信されます）</p>
  <textarea id="opinionText" rows="3" style="width:100%; box-sizing:border-box; padding:8px; background:#fff; color:#222; border:1px solid #ccc; border-radius:4px; resize:vertical; font-size:14px;" placeholder="要望・不具合・感想など何でもどうぞ"></textarea>
  <div style="text-align:right; margin-top:8px;">
    <button onclick="submitOpinion()" style="padding:6px 20px; background:#0d6efd; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:14px;">送信</button>
  </div>
  <p id="opinionMsg" style="margin:8px 0 0; font-size:13px; color:#888;"></p>
</div>

</body>
</html>
