<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>英語物語 Tier表生成 & キャラ図鑑</title>
  <meta name="description" content="英語物語の対戦キャラTier表を自動生成。キャラ図鑑で全キャラを検索・閲覧できます。">
  <meta name="keywords" content="英語物語,Tier表,キャラ図鑑,ゆる,対戦">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body{padding:20px;background:#f8f9fa;font-family:sans-serif}
    .container{max-width:640px;background:#fff;padding:25px;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,.1);margin:auto}
    .tier-row{display:flex;align-items:center;border-bottom:1px solid #dee2e6;padding:10px 0}
    .rank-label{width:50px;font-weight:bold;font-size:1.1rem;color:#333}
    .icon-list img{width:45px;height:45px;margin:2px;border-radius:5px;border:1px solid #ccc}
    label{font-size:.85rem;font-weight:bold;color:#666;margin-top:8px}
    .small-info{font-size:.75rem;color:#888;font-weight:normal}
    .zk-l1{margin-bottom:8px}
    .zk-b1{width:100%;text-align:left;font-weight:bold;font-size:.9rem;padding:8px 14px;border:none;border-radius:8px;cursor:pointer;color:#fff;display:flex;justify-content:space-between;align-items:center}
    .zk-b1:hover{filter:brightness(1.1)}
    .zk-b2{width:100%;text-align:left;font-weight:bold;font-size:.82rem;padding:6px 12px;border:1px solid #dee2e6;border-radius:6px;cursor:pointer;background:#e9ecef;color:#333;display:flex;justify-content:space-between;align-items:center;margin-top:4px}
    .zk-b2:hover{background:#dee2e6}
    .zk-b3{width:100%;text-align:left;font-weight:bold;font-size:.76rem;padding:5px 10px;border:1px solid #eee;border-radius:5px;cursor:pointer;background:#f8f9fa;color:#495057;display:flex;justify-content:space-between;align-items:center;margin-top:3px}
    .zk-b3:hover{background:#e9ecef}
    .zk-b1 .ar,.zk-b2 .ar,.zk-b3 .ar{transition:transform .2s;font-size:.65rem}
    .zk-b1.op .ar,.zk-b2.op .ar,.zk-b3.op .ar{transform:rotate(90deg)}
    .zk-bd{display:none;padding:4px 4px 4px 8px}
    .zk-bd.op{display:block}
    .zk-head{font-size:.72rem;font-weight:bold;color:#fff;background:#6c757d;padding:3px 8px;border-radius:4px;margin:8px 0 4px;width:100%}
    .zk-grid{display:flex;flex-wrap:wrap;gap:4px;padding:2px 0}
    .zk-card{width:64px;text-align:center;transition:transform .12s}
    .zk-card:hover{transform:scale(1.1)}
    .zk-card img{width:54px;height:54px;border-radius:6px;border:1px solid #dee2e6;object-fit:cover;background:#f0f0f0}
    .zk-name{font-size:.52rem;line-height:1.1;margin-top:1px;word-break:break-all;color:#555}
    .zk-match img{border:2px solid #ffc107!important;box-shadow:0 0 5px rgba(255,193,7,.5)}
    .zk-match .zk-name{color:#d63384;font-weight:bold}
  </style>
</head>
<body>
<div class="container">
  <h4 class="text-center mb-4">Tier表生成</h4>
  <div class="mb-3">
    <label>モード</label>
    <select id="mode" class="form-select">
      <option>ランクアップ</option><option>使用者数</option>
    </select>
  </div>
  <div class="row mb-3">
    <div class="col-6"><label>属性（縛り）</label><select id="attribute" class="form-select"><option value="">指定なし</option></select></div>
    <div class="col-6"><label>コスト帯</label>
      <select id="cost" class="form-select"><option value="">指定なし</option><option value="低">低 (~150)</option><option value="中">中 (151~220)</option><option value="高">高 (221~350)</option><option value="超高">超高 (351~)</option></select>
    </div>
  </div>
  <div class="row mb-3">
    <div class="col-4"><label>枠 (1-5)</label>
      <select id="waku" class="form-select"><option value="">指定なし</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
    </div>
    <div class="col-4"><label>補正</label>
      <select id="hosei" class="form-select"><option value="0" selected>含まない</option><option value="">含む</option><option value="1">補正のみ</option></select>
    </div>
    <div class="col-4"><label>最小データ数</label>
      <select id="minCount" class="form-select"><option value="5">5</option><option value="10" selected>10</option><option value="20">20</option></select>
    </div>
  </div>
  <button class="btn btn-primary w-100 py-3 fw-bold shadow-sm" onclick="execTier()" id="btn" disabled>データ読み込み中...</button>
  <div id="tier-result" class="mt-4"></div>

  <hr class="my-5">
  <h4 class="text-center mb-3">📖 キャラ図鑑</h4>
  <button class="btn btn-outline-success w-100 py-2 fw-bold" onclick="loadZukan()" id="zkBtn">キャラ図鑑を表示</button>
  <div id="zkLoader" class="text-center mt-3" style="display:none"><div class="spinner-border text-success me-2"></div><span>読み込み中...</span></div>
  <div id="zkControls" style="display:none" class="mt-3">
    <input type="text" id="zkSearch" class="form-control mb-2" placeholder="キャラ名で検索...">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span id="zkCount" class="text-muted small me-auto"></span>
      <button class="btn btn-sm btn-outline-secondary" onclick="toggleAll()">全て開く/閉じる</button>
    </div>
  </div>
  <div id="zkBox"></div>
  <footer class="text-center mt-5 text-muted small">
    <p>英語物語 非公式ツール</p>
  </footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
var tierData=null;

window.onload=function(){
  fetch('tier_all_patterns.json').then(function(r){return r.json()}).then(function(d){
    tierData=d;
    var sel=document.getElementById('attribute');
    var sb=d.meta.shibari;
    Object.keys(sb).forEach(function(id){sel.add(new Option(sb[id],id))});
    var btn=document.getElementById('btn');
    btn.disabled=false;
    btn.textContent='Tierを生成・表示';
  }).catch(function(){
    document.getElementById('btn').textContent='読み込み失敗';
    document.getElementById('tier-result').innerHTML='<div class="alert alert-danger">Tierデータの読み込みに失敗しました。</div>';
  });
};

function execTier(){
  var sk=document.getElementById('attribute').value||'*';
  var ck=document.getElementById('cost').value||'*';
  var wk=document.getElementById('waku').value||'*';
  var hv=document.getElementById('hosei').value;
  var hk=hv===''?'*':hv;
  var key=sk+'|'+ck+'|'+wk+'|'+hk;
  var bucket=tierData.data[key];
  var r=document.getElementById('tier-result');
  if(!bucket){r.innerHTML='<p class="text-muted">該当データなし。</p>';return}

  var mode=document.getElementById('mode').value;
  var minCount=Number(document.getElementById('minCount').value);
  var results=[];
  Object.keys(bucket).forEach(function(cId){
    var d=bucket[cId];
    if(d[0]<minCount)return;
    results.push({cId:cId,count:d[0],rate:d[0]?d[1]/d[0]:0});
  });
  if(mode==='使用者数'){results.sort(function(a,b){return b.count-a.count})}
  else{results.sort(function(a,b){return b.rate-a.rate})}

  var tierNames=['S','A','B','C','D','E','F','G'];
  var th;
  if(mode==='使用者数'){
    var m=results.length?results[0].count:0;
    th=[m/2,m/3,m/4,m/5,m/6,m/7,m/8,0];
  }else{
    th=[0.4,0.25,0.1,0,-0.1,-0.25,-0.4,-Infinity];
  }

  var tiers=tierNames.map(function(){return[]});
  results.forEach(function(x){
    var val=mode==='使用者数'?x.count:x.rate;
    for(var i=0;i<th.length;i++){if(val>=th[i]){tiers[i].push(x.cId);break}}
  });

  var html='<h5 class="mb-3 border-bottom pb-2">生成結果</h5>';
  var any=false;
  tiers.forEach(function(cs,i){
    if(!cs.length)return;
    any=true;
    html+='<div class="tier-row"><div class="rank-label text-secondary">'+tierNames[i]+'</div><div class="icon-list">';
    cs.forEach(function(cId){html+='<img src="https://englishstoryserver.com/Icon/Icon/Icon'+cId+'.png">'});
    html+='</div></div>';
  });
  r.innerHTML=any?html:'<p class="text-muted">該当データなし。</p>';
}

/* === 図鑑 === */
var zkData=null,zkTimer=null;var L1C={'通常ゆる':'#198754','特殊ゆる':'#dc3545'};
function loadZukan(){var b=document.getElementById('zkBtn'),l=document.getElementById('zkLoader');b.disabled=true;l.style.display='block';fetch('zukan.json').then(function(r){return r.json()}).then(function(d){l.style.display='none';b.style.display='none';zkData=d;document.getElementById('zkControls').style.display='block';document.getElementById('zkSearch').addEventListener('input',function(){clearTimeout(zkTimer);zkTimer=setTimeout(renderZukan,200)});renderZukan()}).catch(function(){l.style.display='none';b.disabled=false;document.getElementById('zkBox').innerHTML='<div class="alert alert-danger">読み込み失敗</div>'})}
function renderZukan(){var q=(document.getElementById('zkSearch').value||'').trim().toLowerCase();var tree={},total=0,hits=0;for(var i=0;i<zkData.length;i++){var r=zkData[i],m=q&&r.n.toLowerCase().indexOf(q)>=0;total++;if(m)hits++;if(q&&!m)continue;if(!tree[r.d])tree[r.d]={};if(!tree[r.d][r.c])tree[r.d][r.c]={};var sk=r.s||'_';if(!tree[r.d][r.c][sk])tree[r.d][r.c][sk]={};var hk=r.h||'_';if(!tree[r.d][r.c][sk][hk])tree[r.d][r.c][sk][hk]=[];tree[r.d][r.c][sk][hk].push({n:r.n,u:r.u,m:m})}var op=!!q,html='';var l1k=Object.keys(tree);l1k.sort(function(a){return a==='通常ゆる'?-1:1});for(var i1=0;i1<l1k.length;i1++){var d=l1k[i1],bg=L1C[d]||'#6c757d',l2k=Object.keys(tree[d]),l2h='';for(var i2=0;i2<l2k.length;i2++){var c=l2k[i2],l3=tree[d][c],l3k=Object.keys(l3),hasL3=!(l3k.length===1&&l3k[0]==='_'),l3h='';for(var i3=0;i3<l3k.length;i3++){var s=l3k[i3],l4=l3[s],l4k=Object.keys(l4),cards='';for(var i4=0;i4<l4k.length;i4++){var h=l4k[i4],chars=l4[h];if(h!=='_')cards+='<div class="zk-head">'+h+'</div>';for(var ic=0;ic<chars.length;ic++){var ch=chars[ic];cards+='<div class="zk-card'+(ch.m?' zk-match':'')+'">'+'<img src="'+ch.u+'" loading="lazy"><div class="zk-name">'+ch.n+'</div></div>'}}if(hasL3&&s!=='_'){l3h+='<div style="margin:2px 0"><button class="zk-b3'+(op?' op':'')+'" onclick="tgl(this)">'+s+' <span class="ar">▶</span></button><div class="zk-bd'+(op?' op':'')+'"><div class="zk-grid">'+cards+'</div></div></div>'}else{l3h+='<div class="zk-grid">'+cards+'</div>'}}l2h+='<div style="margin:3px 0"><button class="zk-b2'+(op?' op':'')+'" onclick="tgl(this)">'+c+' <span class="ar">▶</span></button><div class="zk-bd'+(op?' op':'')+'">'+l3h+'</div></div>'}html+='<div class="zk-l1"><button class="zk-b1'+(op?' op':'')+'" style="background:'+bg+'" onclick="tgl(this)">'+d+' <span class="ar">▶</span></button><div class="zk-bd'+(op?' op':'')+'">'+l2h+'</div></div>'}document.getElementById('zkCount').textContent=q?hits+'件ヒット / 全'+total+'体':'全'+total+'体';var box=document.getElementById('zkBox');box.innerHTML=html||'<p class="text-muted mt-3">該当なし</p>';if(q&&hits>0){var f=box.querySelector('.zk-match');if(f)f.scrollIntoView({behavior:'smooth',block:'center'})}}
function tgl(b){b.classList.toggle('op');b.nextElementSibling.classList.toggle('op')}
function toggleAll(){var bs=document.querySelectorAll('.zk-b1,.zk-b2,.zk-b3'),any=false;for(var i=0;i<bs.length;i++){if(bs[i].classList.contains('op')){any=true;break}}for(var i=0;i<bs.length;i++){if(any){bs[i].classList.remove('op');bs[i].nextElementSibling.classList.remove('op')}else{bs[i].classList.add('op');bs[i].nextElementSibling.classList.add('op')}}}
</script>
</body>
</html>
